{# _topbar.html — included by every app page
   Caller sets: page_title = 'Dashboard' etc. #}
<header class="topbar">
  <button class="mobile-menu-btn" id="sbMobileBtn" aria-label="Open menu">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <span class="tb-title">{{ page_title }}</span>
  <span class="tb-spacer"></span>
  <span class="tb-clock live-clock"></span>
  <button class="icon-btn theme-btn" aria-label="Toggle theme">
    <svg class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"></svg>
  </button>
  <div class="dropdown">
    <button class="user-pill" id="userBtn" aria-label="User menu">
      <div class="u-avatar">{{ (session.get('user','U') or 'U')[0].upper() }}</div>
      <span class="u-name">{{ session.get('user','') }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </button>
    <div class="dropdown-menu hidden" id="userMenu">
      <div class="dropdown-head">
        <div class="fw-6 text-sm">{{ session.get('name','') }}</div>
        <div class="text-xs text-muted" style="text-transform:capitalize;">{{ session.get('role','') }}</div>
      </div>
      <a href="/logout" class="dropdown-item danger">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign Out
      </a>
    </div>
  </div>
</header>
