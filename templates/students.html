<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AttendSmart — Students</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=1.4) }}"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>"/>
<style>
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.filters-bar .form-control{flex:1;min-width:130px;max-width:200px}
.detail-grid{display:flex;flex-direction:column;gap:8px}
.detail-row{display:flex;gap:8px;font-size:.8125rem}
.detail-lbl{color:var(--muted);min-width:90px;font-weight:500;flex-shrink:0}
.att-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.att-mini-item{text-align:center;padding:8px;border-radius:var(--r-lg);background:var(--bg);border:1px solid var(--border)}
.att-mini-val{font-size:1.125rem;font-weight:700}
.att-mini-lbl{font-size:.65rem;text-transform:uppercase;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="app-shell">
  {% set active_page='students' %}{% include '_sidebar.html' %}
  <div class="main-content">
    {% set page_title='Students' %}{% include '_topbar.html' %}
    <main class="page-body">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div><div class="page-title">Student Directory</div><div class="page-sub" id="countText">Loading…</div></div>
        <a href="/register" class="btn btn-primary btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Enroll Student
        </a>
      </div>

      <div class="filters-bar">
        <div class="input-wrap" style="flex:2;min-width:200px;max-width:320px">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="form-control" id="searchInput" placeholder="Search by name, ID…"/>
        </div>
        <select class="form-control" id="filterSection"><option value="">All Divisions</option></select>
        <select class="form-control" id="filterDept"><option value="">All Departments</option></select>
        <select class="form-control" id="sortBy">
          <option value="name">Sort: Name</option>
          <option value="rollNo">Sort: Roll No</option>
          <option value="att_desc">Attendance ↓</option>
          <option value="att_asc">Attendance ↑</option>
        </select>
      </div>

      <div class="students-grid" id="studentsGrid">
        <div style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-title">Loading students…</div></div></div>
      </div>
    </main>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal-box">
    <div id="viewMode">
      <div class="flex items-start gap-4 mb-4">
        <img id="detailPhoto" src="" alt="" style="width:72px;height:72px;border-radius:var(--r-xl);object-fit:cover;border:1px solid var(--border);flex-shrink:0"/>
        <div class="flex-1">
          <div class="fw-7 text-lg" id="detailName"></div>
          <div class="text-sm text-muted" id="detailId"></div>
          <div class="att-mini" id="detailAttMini"></div>
        </div>
      </div>
      <div class="detail-grid" id="detailFields"></div>
      <div class="flex gap-2 mt-4" style="border-top:1px solid var(--border);padding-top:14px">
        <button class="btn btn-secondary btn-sm flex-1" id="editStudentBtn">Edit</button>
        <button class="btn btn-danger btn-sm" id="deleteStudentBtn">Delete</button>
        <button class="btn btn-ghost btn-sm" id="closeDetailBtn">Close</button>
      </div>
    </div>
    <div class="hidden" id="editMode">
      <div class="modal-header"><div class="modal-title">Edit Student</div><button class="modal-close" id="cancelEditBtn">✕</button></div>
      <div class="fg2">
        <div class="form-group"><label class="form-label">Student ID</label><input class="form-control" id="editStudentId"/></div>
        <div class="form-group"><label class="form-label">Roll Number</label><input class="form-control" id="editRollNo"/></div>
        <div class="form-group"><label class="form-label">Class</label>
          <select class="form-control" id="editYear"><option value="FY">FY</option><option value="SY">SY</option><option value="TY">TY</option></select>
        </div>
        <div class="form-group"><label class="form-label">Division</label>
          <select class="form-control" id="editSection"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="V">V</option></select>
        </div>
        <div class="form-group"><label class="form-label">Department</label><input class="form-control" id="editDept"/></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="editEmail"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-control" type="tel" id="editPhone"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="cancelEditBtn2">Cancel</button>
        <button class="btn btn-primary btn-sm" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
<script src="{{ url_for('static', filename='js/students.js', v=1.4) }}"></script>
</body>
</html>
